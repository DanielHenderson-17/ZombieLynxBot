<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Transcript - #{TICKET_ID}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body { background-color: #1f1f1f; color: #fff; padding: 20px; }
      .message { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #444; }
      .timestamp { font-size: 0.9rem; color: #aaa; }
      .username { font-weight: bold; color: #2ecc71; }
      img { max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h3 class="mb-4">📜 Transcript for Ticket #{TICKET_ID}</h3>
    <div id="messages">{MESSAGES}</div>
  </body>
</html>
